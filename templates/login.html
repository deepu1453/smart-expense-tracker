{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:3rem;">⚡</div>
      <h2 style="font-weight:800; color:#fff; margin-bottom:4px;">Welcome Back!</h2>
      <p style="color:#64748b;">Sign in to manage your finances</p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; color:#ef4444; font-size:0.9rem;">
      Warning: {{ error }}
    </div>
    {% endif %}

    <div class="card p-4" style="border-radius:20px;">
      <form method="POST" action="/login">

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Username</label>
          <input type="text" name="username" class="form-control mt-2" placeholder="Enter your username" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-4">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Password</label>
          <input type="password" name="password" class="form-control mt-2" placeholder="Enter your password" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <button type="submit" class="btn btn-primary w-100" style="padding:14px; font-size:1rem; font-weight:700; border-radius:12px;">
          Sign In
        </button>

      </form>

      <div style="text-align:center; margin-top:20px; color:#64748b; font-size:13px;">
        New to SpendSmart?
        <a href="/register" style="color:#a78bfa; text-decoration:none; font-weight:600;">Create Account</a>
      </div>
    </div>

    <div style="text-align:center; margin-top:24px; color:#475569; font-size:12px;">
      Built by Team SpendSmart
    </div>

  </div>
</div>
{% endblock %}
