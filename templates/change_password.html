{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:3rem;">🔒</div>
      <h2 style="font-weight:800; color:#fff; margin-bottom:4px;">Account Settings</h2>
      <p style="color:#64748b;">Logged in as <strong style="color:#a78bfa;">{{ current_username }}</strong></p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; color:#ef4444; font-size:0.9rem;">
      Warning: {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; color:#22c55e; font-size:0.9rem;">
      Success: {{ success }}
    </div>
    {% endif %}

    <!-- CHANGE PASSWORD -->
    <div class="card p-4 mb-4" style="border-radius:20px;">
      <h5 style="color:#fff; margin-bottom:16px;">🔑 Change Password</h5>
      <form method="POST" action="/change-password">
        <input type="hidden" name="action" value="change_password">

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Current Password</label>
          <input type="password" name="current_password" class="form-control mt-2" placeholder="Enter your current password" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">New Password</label>
          <input type="password" name="new_password" class="form-control mt-2" placeholder="Enter your new password (min 6 characters)" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-4">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control mt-2" placeholder="Re-enter your new password" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <button type="submit" class="btn btn-primary w-100" style="padding:14px; font-size:1rem; font-weight:700; border-radius:12px;">
          Update Password
        </button>
      </form>
    </div>

    <!-- CHANGE USERNAME -->
    <div class="card p-4" style="border-radius:20px;">
      <h5 style="color:#fff; margin-bottom:16px;">👤 Change Username</h5>
      <form method="POST" action="/change-password">
        <input type="hidden" name="action" value="change_username">

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Current Password</label>
          <input type="password" name="current_password" class="form-control mt-2" placeholder="Confirm with your current password" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-4">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">New Username</label>
          <input type="text" name="new_username" class="form-control mt-2" placeholder="Enter your new username" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <button type="submit" class="btn btn-primary w-100" style="padding:14px; font-size:1rem; font-weight:700; border-radius:12px;">
          Update Username
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
