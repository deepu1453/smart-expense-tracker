{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:3rem;">⚡</div>
      <h2 style="font-weight:800; color:#fff; margin-bottom:4px;">Create Your Account</h2>
      <p style="color:#64748b;">Join SpendSmart and take control of your money</p>
    </div>

    {% if error %}
    <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; color:#ef4444; font-size:0.9rem;">
      Warning: {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:12px; padding:14px 18px; margin-bottom:20px; color:#22c55e; font-size:0.9rem;">
      Success: {{ success }}
    </div>
    {% endif %}

    <div class="card p-4" style="border-radius:20px;">
      <form method="POST" action="/register">

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Username</label>
          <input type="text" name="username" class="form-control mt-2" placeholder="Choose a username" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-3">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Email</label>
          <input type="email" name="email" class="form-control mt-2" placeholder="Enter your email" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <div class="mb-4">
          <label style="color:#a78bfa; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Password</label>
          <input type="password" name="password" class="form-control mt-2" placeholder="Choose a strong password" required
            style="padding:14px 18px; border-radius:12px; font-size:1rem;">
        </div>

        <button type="submit" class="btn btn-primary w-100" style="padding:14px; font-size:1rem; font-weight:700; border-radius:12px;">
          Create Account
        </button>

      </form>

      <div style="text-align:center; margin-top:20px; color:#64748b; font-size:13px;">
        Already have an account?
        <a href="/login" style="color:#a78bfa; text-decoration:none; font-weight:600;">Sign In Here</a>
      </div>
    </div>

    <div style="text-align:center; margin-top:24px; color:#475569; font-size:12px;">
      Built by Team SpendSmart
    </div>

  </div>
</div>
{% endblock %}
